auth_enabled: false

server:
  http_listen_port: 3100

common:
  path_prefix: /tmp/loki
  storage:
    filesystem:
      chunks_directory: /tmp/loki/chunks
      rules_directory: /tmp/loki/rules

schema_config:
  configs:
    - from: 2020-10-24
      store: boltdb-shipper
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

  # Limit stored chunks for local-dev.
  # (Loki still runs fine without compactor/advanced settings.)

limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h
