global:
  scrape_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  # Prometheus scrapes the app metrics endpoint running on the host.
  # On Linux, we map host.docker.internal -> host-gateway in docker-compose.
  - job_name: gox-api
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8080"]
