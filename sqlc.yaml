version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "db/migration/000001_init_schema.up.sql"
    queries: "db/query"
    gen:
      go:
        package: "sqlc"
        out: "internal/repository/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
